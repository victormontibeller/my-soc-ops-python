<div id="game-container">
<div class="ops-landing">

    <!-- Scanline texture overlay -->
    <div class="ops-scanlines" aria-hidden="true"></div>

    <!-- ── Hero ─────────────────────────────────────────────── -->
    <header class="ops-hero">
        <span class="ops-badge">Event Ops</span>
        <h1 class="ops-title">Soc Ops</h1>
        <p class="ops-subtitle">Social Bingo · Mission Briefing</p>
    </header>

    <!-- ── Mission Checklist (How to play) ───────────────────── -->
    <section class="ops-section">
        <h2 class="ops-section-label">How to play</h2>
        <ul class="ops-checklist">
            <li class="ops-check-item">
                <span class="ops-check-icon">01</span>
                <span>Find people who match the questions</span>
            </li>
            <li class="ops-check-item">
                <span class="ops-check-icon">02</span>
                <span>Tap a square when you find a match</span>
            </li>
            <li class="ops-check-item ops-check-item--win">
                <span class="ops-check-icon">03</span>
                <span>Get 5 in a row to win!</span>
            </li>
        </ul>
    </section>

    <!-- ── Quick Facts / Objectives ──────────────────────────── -->
    <section class="ops-section">
        <h2 class="ops-section-label">Objectives</h2>
        <div class="ops-facts-grid">
            <div class="ops-fact-card">
                <span class="ops-fact-value">5×5</span>
                <span class="ops-fact-label">Grid Size</span>
            </div>
            <div class="ops-fact-card">
                <span class="ops-fact-value">24</span>
                <span class="ops-fact-label">Questions</span>
            </div>
            <div class="ops-fact-card ops-fact-card--win">
                <span class="ops-fact-value">BINGO</span>
                <span class="ops-fact-label">5 in a row</span>
            </div>
        </div>
    </section>

    <!-- ── Primary CTA ───────────────────────────────────────── -->
    <div class="ops-cta">
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="ops-start-btn">
            Start Game
        </button>
    </div>

</div>
</div>
